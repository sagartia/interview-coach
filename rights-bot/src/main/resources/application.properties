spring.application.name=interview-coach

# Open AI設定
spring.ai.openai.api-key=${GITHUB_KEY}
spring.ai.openai.base-url=https://models.inference.ai.azure.com
spring.ai.openai.chat.options.model=gpt-4.1-nano
spring.ai.openai.chat.completions-path=/chat/completions

# 伺服器port
server.port=8080

# 嵌入設定
spring.ai.openai.embedding.api-key=${GITHUB_KEY}
spring.ai.openai.embedding.base-url=https://models.inference.ai.azure.com
spring.ai.openai.embedding.embeddings-path=/embeddings
spring.ai.openai.embedding.options.model=text-embedding-3-small
# 向量資料庫設定
spring.ai.vectorstore.chroma.client.host=http://localhost
spring.ai.vectorstore.chroma.client.port=8000
spring.ai.vectorstore.chroma.collection-name=interview-collection
spring.ai.vectorstore.chroma.initialize-schema=true